seed: 42
device: cpu
epochs: 1

data:
  batch_size: 512
  num_workers: 0
  pin_memory: false
  drop_last: true
  prefetch_factor: 4
  shuffle_buffer: 0

compile:
  enabled: false
  mode: default

optimizer:
  type: ftrl
  lr: 0.1
  beta: 1.0
  lambda1: 1.0
  lambda2: 1.0

scheduler:
  enabled: false

checkpoint:
  monitor: val_gauc
  mode: max

logging:
  verbose: true

early_stop:
  enabled: false

evaluation: {}

inspector:
  enabled: false
  log_first: 3
  log_every: 0
