seed: 42
device: cpu
epochs: 5

data:
  batch_size: 512
  num_workers: 4
  pin_memory: false
  drop_last: false
  prefetch_factor: 4
  shuffle_buffer: 8192

compile:
  enabled: true
  mode: default

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.00001

scheduler:
  enabled: true

checkpoint:
  monitor: val_gauc
  mode: max

logging:
  verbose: true

early_stop:
  enabled: true

evaluation: {}

inspector:
  enabled: false
  log_first: 3
  log_every: 0
