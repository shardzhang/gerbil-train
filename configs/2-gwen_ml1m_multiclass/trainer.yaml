seed: 42
device: cpu
epochs: 5

data:
  batch_size: 512
  num_workers: 4
  pin_memory: false
  drop_last: true
  prefetch_factor: 4

compile:
  enabled: false
  mode: default

loss:
  type: ce                      # ce | nce | sampled_softmax
  num_sampled: 500              # 仅 nce / sampled_softmax 时生效

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.00001

scheduler:
  enabled: true
  mode: max
  factor: 0.5
  patience: 2
  warmup_steps: 0         # 线性warmup步数(0=禁用)
  decay_rate: 0           # exponential decay rate(负值, 0=禁用)
  learning_rate_min: 1e-6 # LR 下限

checkpoint:
  monitor: val_hit@1
  mode: max

early_stop:
  enabled: false

logging:
  verbose: true

evaluation: {}
inspector:
  enabled: false
  log_first: 3
  log_every: 0
