seed: 42
device: cpu
epochs: 3

data:
  batch_size: 512
  num_workers: 4
  pin_memory: false
  drop_last: true
  prefetch_factor: 4
  shuffle_buffer: 8192

compile:
  enabled: false
  mode: default

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.0

scheduler:
  enabled: false

checkpoint:
  monitor: val_auc
  mode: max

early_stop:
  enabled: false
  patience: 3

evaluation: {}

inspector:
  enabled: false
  log_first: 3
  log_every: 0
