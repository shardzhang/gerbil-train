seed: 42
device: cpu

epochs: 1
loss_name: lambdarank

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.0

scheduler:
  enabled: true
  type: reduce_on_plateau
  factor: 0.5
  patience: 3
  mode: max

gradient:
  clip_grad_norm: null

checkpoint:
  dir: checkpoints/ltr
  best_checkpoint_path: checkpoints/ltr/best_model_lambdarank.pth
  monitor: val_ndcg
  mode: max

early_stop:
  enabled: true
  patience: 5

logging:
  log_dir: checkpoints/ltr/log_dir/lambdarank
  plot_path: checkpoints/ltr/training_curves_lambdarank.png

evaluation:
  val_k: 5
