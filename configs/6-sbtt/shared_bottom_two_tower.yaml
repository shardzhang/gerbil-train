type: shared_bottom_two_tower
family: two_tower
task: multitask_recommendation
description: Shared-Bottom Two-Tower model with explicit and implicit task-specific towers.

model:
  query_input_dim: 128
  item_input_dim: 128

  shared_bottom:
    hidden_dims: [256, 128]
    activation: relu
    dropout: 0.1
    batch_norm: false

  explicit_tower:
    hidden_dims: [128, 64]
    activation: relu
    dropout: 0.1
    batch_norm: false

  implicit_tower:
    hidden_dims: [128, 64]
    activation: relu
    dropout: 0.1
    batch_norm: false
    
  embedding_dim: 32
  normalize_embedding: false
  score_fn: dot

loss:
  implicit:
    enabled: true
    type: sampled_softmax
    weight: 1.0
    reduction: mean

  explicit:
    enabled: true
    type: mse
    weight: 1.0
    reduction: mean

output:
  return_scores: true
  return_explicit_embedding: true
  return_implicit_embedding: true

export:
  serving_tower: explicit
  export_query_tower: true
  export_item_tower: true