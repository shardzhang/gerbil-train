seed: 42
device: cpu
epochs: 3

data:
  batch_size: 512
  num_workers: 4
  pin_memory: false
  drop_last: true
  prefetch_factor: 4
  shuffle_buffer: 8192

compile:
  enabled: false
  mode: default

loss:
  type: sampled_softmax
  num_sampled: 500

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.00001

scheduler:
  enabled: true
  mode: max
  factor: 0.5
  patience: 2

checkpoint:
  monitor: val_hit@1
  mode: max

logging:
  verbose: true

early_stop:
  enabled: false

evaluation: {}

inspector:
  enabled: false
  log_first: 3
  log_every: 0
