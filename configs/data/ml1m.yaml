name: ml1m
description: MovieLens 1M raw dataset.

# parquet/csv/tfrecord/jsonl/dat
format: dat

paths:
  root: ../data/ml-1m
  users: ../data/ml-1m/users.dat
  items: ../data/ml-1m/movies.dat
  interactions: ../data/ml-1m/ratings.dat
  # The current shared-bottom CLI still reads these keys.
  train_implicit: ../data/ml-1m/ratings.dat
  train_explicit: ../data/ml-1m/ratings.dat

read:
  separator: "::"
  encoding: latin-1

validation:
  enabled: true
  num_negatives: 99

columns:
  user_id: user_id
  item_id: item_id
  label: rating
  timestamp: timestamp

tables:
  users:
    primary_key: user_id
  items:
    primary_key: item_id
  interactions:
    user_key: user_id
    item_key: item_id
    label_key: rating
    timestamp_key: timestamp

split:
  strategy: leave_one_out
  files:
    train: train.parquet
    valid: valid.parquet
    test: test.parquet


features:
  query:
    dense:
      - user_age
      - user_activity_score
    sparse:
      - user_id_idx
      - gender_idx
      - occupation_idx

  item:
    dense:
      - item_popularity
      - item_ctr_30d
    sparse:
      - item_id_idx
      - category_idx
      - release_year_idx

label:
  explicit:
    field: rating
    type: regression

  implicit:
    field: clicked
    type: binary
    positive_value: 1

query_encoder:
  combine_sparse_dense: concat

item_encoder:
  combine_sparse_dense: concat
