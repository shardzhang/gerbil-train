format: torchscript
description: Export model artifacts for gerbil-serving.

output:
  dir: artifacts/sbtt_ml1m_v1
  model_file: model.pt
  metadata_file: metadata.json
  feature_schema_file: feature_schema.json

serving:
  model_name: gerbil_sbtt
  model_version: v1
  tower: explicit
  signature_name: predict

package:
  include_config: true
  include_metadata: true
  include_feature_schema: true