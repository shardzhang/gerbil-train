seed: 42
device: cuda

trainer:
  # epochs: 10
  # batch_size: 256
  implicit_epochs: 3
  explicit_epochs: 2
  log_interval: 100
  val_interval: 1
  gradient_clip_norm: 5.0

optimizer:
  implicit:
    type: adam
    lr: 0.001
    weight_decay: 0.00001
  explicit:
    type: adam
    lr: 0.0005
    weight_decay: 0.00001

scheduler:
  implicit:
    enabled: false
    type: none
  explicit:
    enabled: false
    type: none

mixed_precision:
  enabled: false

checkpoint:
  dir: checkpoints/sbtt_ml1m_v1
  save_best_only: true
  monitor: ndcg@10
  mode: max

early_stop:
  enabled: true
  monitor: ndcg@10
  mode: max
  patience: 2

logging:
  level: info
  use_tqdm: true