seed: 42
device: cpu
epochs: 5

data:
  batch_size: 512
  num_workers: 4
  pin_memory: false
  drop_last: false
  prefetch_factor: 4

compile:
  enabled: true
  mode: default

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.0

scheduler:
  enabled: false

checkpoint:
  monitor: hit@1
  mode: max

early_stop:
  enabled: false

evaluation:
  topk: 10

loss:
  type: nce                  # ce | nce | sampled_softmax
  num_sampled: 100          # only used for nce / sampled_softmax
